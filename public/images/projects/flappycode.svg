<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Flappy Code">
  <defs>
    <linearGradient id="fcSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cd2ff"/>
      <stop offset="100%" stop-color="#2a8fcc"/>
    </linearGradient>
    <linearGradient id="fcEditor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f7a4a"/>
      <stop offset="50%" stop-color="#3ec97c"/>
      <stop offset="100%" stop-color="#1f7a4a"/>
    </linearGradient>
  </defs>

  <!-- Background: a code editor (translucent so the game floats on top) -->
  <rect width="1600" height="800" fill="url(#fcEditor)"/>

  <!-- Editor window chrome -->
  <g>
    <rect x="40" y="40" width="1520" height="720" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
    <rect x="40" y="40" width="1520" height="42" rx="14" fill="#161b22"/>
    <circle cx="74" cy="61" r="7" fill="#ff5f56"/>
    <circle cx="98" cy="61" r="7" fill="#ffbd2e"/>
    <circle cx="122" cy="61" r="7" fill="#27c93f"/>
    <text x="160" y="67" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#7d8590">main.py — claude is thinking…</text>
  </g>

  <!-- Editor content (faded, behind game) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" opacity="0.4">
    <text x="80"  y="120" fill="#7d8590">  1</text><text x="120" y="120" fill="#ff7b72">def </text><text x="160" y="120" fill="#d2a8ff">solve</text><text x="220" y="120" fill="#c9d1d9">(problem):</text>
    <text x="80"  y="146" fill="#7d8590">  2</text><text x="120" y="146" fill="#7d8590"># spinner spinning…</text>
    <text x="80"  y="172" fill="#7d8590">  3</text><text x="120" y="172" fill="#79c0ff">    return</text><text x="220" y="172" fill="#a5d6ff"> claude.think()</text>
    <text x="80"  y="198" fill="#7d8590">  4</text>
    <text x="80"  y="224" fill="#7d8590">  5</text><text x="120" y="224" fill="#7d8590"># meanwhile, in another window…</text>
  </g>

  <!-- Game window: rounded sky panel sitting on top of the editor -->
  <g transform="translate(360 240)">
    <!-- panel shadow -->
    <rect x="6" y="10" width="900" height="500" rx="20" fill="#000000" opacity="0.4"/>
    <!-- panel -->
    <rect width="900" height="500" rx="20" fill="url(#fcSky)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <!-- panel header strip -->
    <rect width="900" height="32" rx="20" fill="#0d1117" opacity="0.7"/>
    <text x="20" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c9d1d9">flappy.py</text>
    <text x="850" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c9d1d9">×</text>

    <!-- Clouds -->
    <g fill="#ffffff" opacity="0.55">
      <ellipse cx="120" cy="120" rx="48" ry="18"/>
      <ellipse cx="160" cy="110" rx="32" ry="14"/>
      <ellipse cx="700" cy="160" rx="50" ry="18"/>
      <ellipse cx="740" cy="150" rx="34" ry="15"/>
    </g>

    <!-- Pipes -->
    <g>
      <rect x="320" y="60"  width="80" height="160" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>
      <rect x="305" y="200" width="110" height="22" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>

      <rect x="320" y="340" width="80" height="160" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>
      <rect x="305" y="328" width="110" height="22" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>

      <rect x="640" y="60"  width="80" height="100" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>
      <rect x="625" y="140" width="110" height="22" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>

      <rect x="640" y="280" width="80" height="220" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>
      <rect x="625" y="268" width="110" height="22" fill="url(#pipe)" stroke="#0a3a23" stroke-width="3"/>
    </g>

    <!-- Bird -->
    <g transform="translate(190 270) rotate(-12)">
      <ellipse cx="0" cy="0" rx="32" ry="24" fill="#ffd83d" stroke="#a96b00" stroke-width="3"/>
      <circle cx="14" cy="-4" r="6" fill="#ffffff"/>
      <circle cx="16" cy="-4" r="3" fill="#222"/>
      <polygon points="28,2 44,2 28,12" fill="#ff8a1c" stroke="#a96b00" stroke-width="2"/>
      <ellipse cx="-6" cy="2" rx="14" ry="8" fill="#ffae3b" stroke="#a96b00" stroke-width="2"/>
    </g>

    <!-- Score -->
    <text x="450" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="44" font-weight="700" fill="#ffffff" stroke="#0a3a23" stroke-width="2" paint-order="stroke">7</text>
  </g>

  <!-- Title -->
  <g font-family="Inter, ui-sans-serif, system-ui">
    <text x="80" y="730" font-size="20" fill="#7d8590">flap while the LLM spins</text>
  </g>
</svg>

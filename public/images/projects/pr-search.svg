<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="pr-search">
  <defs>
    <linearGradient id="prBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="55%" stop-color="#2b1452"/>
      <stop offset="100%" stop-color="#0f0820"/>
    </linearGradient>
    <linearGradient id="prAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a4c"/>
      <stop offset="100%" stop-color="#c45cff"/>
    </linearGradient>
    <radialGradient id="prGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c45cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c45cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="prGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a4c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff8a4c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="prGrid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="800" fill="url(#prBg)"/>
  <rect width="1600" height="800" fill="url(#prGrid)"/>
  <circle cx="220" cy="180" r="280" fill="url(#prGlow)"/>
  <circle cx="1380" cy="640" r="300" fill="url(#prGlow2)"/>

  <!-- Terminal-ish prompt -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="120" y="160" font-size="24" fill="#ff8a4c" opacity="0.9">$ pr-search</text>
    <text x="295" y="160" font-size="24" fill="#eadcff" opacity="0.85"> "auth refactor"</text>
  </g>

  <!-- Embedding cloud / vector dots -->
  <g>
    <circle cx="800" cy="430" r="12" fill="#c45cff"/>
    <g fill="#c45cff" opacity="0.85">
      <circle cx="700" cy="370" r="7"/>
      <circle cx="880" cy="380" r="7"/>
      <circle cx="930" cy="470" r="7"/>
      <circle cx="730" cy="490" r="7"/>
      <circle cx="650" cy="430" r="6"/>
      <circle cx="950" cy="410" r="6"/>
      <circle cx="780" cy="350" r="6"/>
      <circle cx="850" cy="510" r="6"/>
    </g>
    <g fill="#ff8a4c" opacity="0.7">
      <circle cx="600" cy="320" r="5"/>
      <circle cx="1000" cy="350" r="5"/>
      <circle cx="610" cy="510" r="5"/>
      <circle cx="990" cy="510" r="5"/>
      <circle cx="560" cy="400" r="4"/>
      <circle cx="1040" cy="420" r="4"/>
      <circle cx="710" cy="270" r="4"/>
      <circle cx="900" cy="280" r="4"/>
    </g>
    <!-- subtle connector lines -->
    <g stroke="#c45cff" stroke-opacity="0.25" stroke-width="1.2" fill="none">
      <line x1="800" y1="430" x2="700" y2="370"/>
      <line x1="800" y1="430" x2="880" y2="380"/>
      <line x1="800" y1="430" x2="930" y2="470"/>
      <line x1="800" y1="430" x2="730" y2="490"/>
      <line x1="800" y1="430" x2="650" y2="430"/>
      <line x1="800" y1="430" x2="950" y2="410"/>
      <line x1="800" y1="430" x2="780" y2="350"/>
      <line x1="800" y1="430" x2="850" y2="510"/>
    </g>
  </g>

  <!-- PR result cards on right -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <g transform="translate(1100 250)">
      <rect width="380" height="68" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="20" y="28" font-size="18" fill="#ff8a4c">#3421</text>
      <text x="80" y="28" font-size="18" fill="#eadcff">refactor: oauth flow</text>
      <text x="20" y="52" font-size="14" fill="#a89ad6" opacity="0.85">similarity 0.91 · merged</text>
    </g>
    <g transform="translate(1100 340)">
      <rect width="380" height="68" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="20" y="28" font-size="18" fill="#ff8a4c">#2987</text>
      <text x="80" y="28" font-size="18" fill="#eadcff">feat: token rotation</text>
      <text x="20" y="52" font-size="14" fill="#a89ad6" opacity="0.85">similarity 0.87 · open</text>
    </g>
    <g transform="translate(1100 430)">
      <rect width="380" height="68" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="20" y="28" font-size="18" fill="#ff8a4c">#2654</text>
      <text x="80" y="28" font-size="18" fill="#eadcff">fix: auth race condition</text>
      <text x="20" y="52" font-size="14" fill="#a89ad6" opacity="0.85">similarity 0.83 · merged</text>
    </g>
  </g>

  <!-- Title -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="120" y="270" font-size="64" font-weight="700" fill="#ffffff">pr-search</text>
    <text x="120" y="320" font-size="22" fill="#c8b8ec" opacity="0.85">semantic search for github pull requests</text>
    <text x="120" y="700" font-size="20" fill="#ff8a4c" opacity="0.85">rust · onnx · tui</text>
  </g>
</svg>
